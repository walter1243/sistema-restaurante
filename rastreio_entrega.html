<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Rastreamento Profissional - SaaS</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 14px;
            background: #f4f6fb;
            color: #0f172a;
        }

        .card {
            background: #fff;
            padding: 16px;
            border-radius: 14px;
            margin-bottom: 12px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 6px 18px rgba(15, 23, 42, 0.08);
        }

        .status {
            color: #ea1d2c;
            font-weight: 700;
            display: flex;
            align-items: center;
            font-size: 0.85rem;
            letter-spacing: 0.02em;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background: #ea1d2c;
            border-radius: 50%;
            margin-right: 10px;
            animation: pulse 1.5s infinite;
            flex-shrink: 0;
        }

        .titulo {
            margin: 9px 0 5px;
            font-size: clamp(1.15rem, 4vw, 1.45rem);
            line-height: 1.2;
            color: #0f172a;
            font-weight: 800;
        }

        .subtitulo {
            color: #64748b;
            font-size: 0.9rem;
            line-height: 1.35;
        }

        #map {
            height: 66vh;
            min-height: 360px;
            width: 100%;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.12);
            background: #dbeafe;
            overflow: hidden;
        }

        .leaflet-control-attribution {
            font-size: 0.66rem;
            opacity: 0.85;
        }

        .lf-pin {
            width: 34px;
            height: 34px;
            border-radius: 999px;
            display: grid;
            place-items: center;
            color: #fff;
            font-size: 15px;
            border: 2px solid #fff;
            box-shadow: 0 8px 18px rgba(15, 23, 42, 0.25);
        }

        .lf-pin.restaurante { background: #0ea5e9; }
        .lf-pin.cliente { background: #10b981; }
        .lf-pin.moto { background: #ea1d2c; animation: pulse 1.4s infinite; }

        .row {
            margin-top: 12px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
        }

        .kpi {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 10px 12px;
        }

        .kpi span {
            display: block;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #64748b;
            font-weight: 700;
        }

        .kpi strong {
            display: block;
            margin-top: 0.25rem;
            font-size: 0.95rem;
            color: #0f172a;
            font-weight: 800;
            word-break: break-word;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(234, 29, 44, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(234, 29, 44, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(234, 29, 44, 0); }
        }

        @media (max-width: 760px) {
            body { padding: 10px; }
            #map { height: 62vh; min-height: 330px; border-radius: 14px; }
            .row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="status">
            <div class="status-dot"></div>
            <span id="status-banner">PEDIDO A CAMINHO</span>
        </div>
        <h2 class="titulo" id="titulo">Acompanhe em tempo real</h2>
        <p class="subtitulo" id="subtitulo">O entregador está em rota.</p>
    </div>

    <div id="map"></div>

    <div class="row">
        <div class="kpi">
            <span>Status</span>
            <strong id="status-pedido">-</strong>
        </div>
        <div class="kpi">
            <span>Rastreamento</span>
            <strong id="ultima-pos">Ativo</strong>
        </div>
        <div class="kpi">
            <span>Chegada estimada</span>
            <strong id="eta-entrega">—</strong>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="./api_config.js"></script>
    <script>
        const API_URL = window.resolveApiBase
            ? window.resolveApiBase()
            : window.location.origin.replace(/\/$/, '');

        const params = new URLSearchParams(window.location.search);
        const slug = (params.get('slug') || '').trim();
        const pedidoId = Number(params.get('pedido') || 0);

        const GOOGLE_MAP_ID = params.get('mapId') || '';
        const GOOGLE_KEY_PARAM = (params.get('gmapsKey') || '').trim();
        const GOOGLE_KEY_FALLBACK = String(window.getGoogleMapsApiKey ? window.getGoogleMapsApiKey() : (window.__GOOGLE_MAPS_API_KEY__ || '')).trim();
        const MODO_MAPA_PARAM = (params.get('google') || '').trim();

        const estado = {
            modoMapa: 'google',
            map: null,
            directionsService: null,
            directionsRenderer: null,
            markerMoto: null,
            markerCasa: null,
            markerRestaurante: null,
            geocoder: null,
            poller: null,
            geoCache: {},
            ultimoBoundsKey: '',
            googleKey: GOOGLE_KEY_PARAM || GOOGLE_KEY_FALLBACK,
            googleCarregado: false,
            lfMap: null,
            lfMarkers: { moto: null, casa: null, restaurante: null },
            lfLine: null,
            lfDecorLine: null,
            ultimaRotaKey: '',
            restauranteCidadeTrava: '',
            restauranteUfTrava: '',
            centroCidadeTrava: null
        };

        function statusLegivel(status) {
            const mapa = {
                novo: 'Recebido',
                preparando: 'Em preparo',
                pronto: 'Pronto',
                em_entrega: 'Em entrega',
                entregue: 'Entregue',
                cancelado: 'Cancelado',
                fechado: 'Fechado'
            };
            return mapa[String(status || '').toLowerCase()] || status || '-';
        }

        function coordenadaValida(lat, lng) {
            return Number.isFinite(lat)
                && Number.isFinite(lng)
                && Math.abs(lat) <= 90
                && Math.abs(lng) <= 180
                && !(lat === 0 && lng === 0);
        }

        function normalizarTextoGeo(texto = '') {
            return String(texto || '')
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g, '')
                .trim()
                .toLowerCase();
        }

        function normalizarUfGeo(uf = '') {
            return String(uf || '')
                .replace(/^BR-/i, '')
                .replace(/[^A-Za-z]/g, '')
                .trim()
                .toUpperCase()
                .slice(0, 2);
        }

        function atualizarTravaCidadeRestaurante(cidade = '', uf = '') {
            const cidadeNova = String(cidade || '').trim();
            const ufNova = normalizarUfGeo(uf);
            const mudou = cidadeNova !== estado.restauranteCidadeTrava || ufNova !== estado.restauranteUfTrava;
            estado.restauranteCidadeTrava = cidadeNova;
            estado.restauranteUfTrava = ufNova;
            if (mudou) {
                estado.centroCidadeTrava = null;
            }
        }

        function consultaCidadeTrava() {
            return [estado.restauranteCidadeTrava, estado.restauranteUfTrava, 'Brasil']
                .map(v => String(v || '').trim())
                .filter(Boolean)
                .join(', ');
        }

        function extrairCoordenadasEndereco(endereco = {}) {
            if (!endereco || typeof endereco !== 'object') return null;
            const lat = Number(
                endereco.lat
                ?? endereco.latitude
                ?? endereco.latitude_destino
            );
            const lng = Number(
                endereco.lng
                ?? endereco.lon
                ?? endereco.long
                ?? endereco.longitude
                ?? endereco.longitude_destino
                ?? endereco.long_destino
                ?? endereco.lon_destino
            );
            if (!coordenadaValida(lat, lng)) return null;
            return { lat, lng };
        }

        function enderecoParaTexto(endereco = {}) {
            if (!endereco || typeof endereco !== 'object') return '';
            const mapsFormatado = String(endereco.maps_formatado || endereco.formatted_address || '').trim();
            if (mapsFormatado) return mapsFormatado;
            const p1 = [endereco.rua, endereco.numero].filter(Boolean).join(', ');
            const p2 = [endereco.bairro, endereco.cidade, endereco.uf].filter(Boolean).join(' - ');
            const p3 = [endereco.complemento, endereco.referencia].filter(Boolean).join(' | ');
            return [p1, p2, p3].filter(Boolean).join(' · ');
        }

        function atualizarCabecalho(status, nomeRestaurante) {
            const st = String(status || '').toLowerCase();
            const banner = document.getElementById('status-banner');
            if (['entregue', 'cancelado', 'fechado'].includes(st)) {
                banner.textContent = 'PEDIDO FINALIZADO';
            } else if (st === 'em_entrega') {
                banner.textContent = 'PEDIDO A CAMINHO';
            } else {
                banner.textContent = 'ACOMPANHAMENTO DO PEDIDO';
            }

            document.getElementById('titulo').textContent = `Pedido #${pedidoId} · ${statusLegivel(status)}`;
            document.getElementById('subtitulo').textContent = nomeRestaurante
                ? `Entrega do ${nomeRestaurante}`
                : 'Acompanhe o deslocamento em tempo real.';

            document.getElementById('ultima-pos').textContent = ['entregue', 'cancelado', 'fechado'].includes(st)
                ? 'Encerrado'
                : 'Ativo';

            if (['entregue', 'cancelado', 'fechado'].includes(st)) {
                document.getElementById('eta-entrega').textContent = 'Encerrado';
            }
        }

        function atualizarEta(texto = '—') {
            const el = document.getElementById('eta-entrega');
            if (!el) return;
            el.textContent = texto || '—';
        }

        function calcularDistanciaKm(origem, destino) {
            if (!origem || !destino) return null;
            const toRad = (grau) => (grau * Math.PI) / 180;
            const R = 6371;
            const dLat = toRad(destino.lat - origem.lat);
            const dLng = toRad(destino.lng - origem.lng);
            const lat1 = toRad(origem.lat);
            const lat2 = toRad(destino.lat);

            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2)
                + Math.sin(dLng / 2) * Math.sin(dLng / 2) * Math.cos(lat1) * Math.cos(lat2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        }

        function atualizarEtaAproximado(origem, destino) {
            const km = calcularDistanciaKm(origem, destino);
            if (!Number.isFinite(km) || km <= 0) {
                atualizarEta('—');
                return;
            }
            const velocidadeMediaKmh = 28;
            const minutos = Math.max(1, Math.round((km / velocidadeMediaKmh) * 60));
            atualizarEta(`~${minutos} min`);
        }

        async function geocodificarEnderecoGoogle(texto) {
            const chave = String(texto || '').trim().toLowerCase();
            if (!chave) return null;
            if (estado.geoCache[chave]) return estado.geoCache[chave];

            if (!(window.google && google.maps)) return null;

            if (!estado.geocoder) {
                estado.geocoder = new google.maps.Geocoder();
            }

            const cidadeNorm = normalizarTextoGeo(estado.restauranteCidadeTrava || '');
            const ufNorm = normalizarUfGeo(estado.restauranteUfTrava || '');

            const consultaComTrava = [texto, estado.restauranteCidadeTrava, estado.restauranteUfTrava, 'Brasil']
                .map(v => String(v || '').trim())
                .filter(Boolean)
                .join(', ');

            const coordenada = await new Promise((resolve) => {
                estado.geocoder.geocode({ address: consultaComTrava || texto, region: 'br' }, (results, status) => {
                    if (status !== 'OK' || !results || !results.length) {
                        resolve(null);
                        return;
                    }

                    const melhor = results.find((item) => {
                        if (!item || typeof item !== 'object') return false;
                        const comps = Array.isArray(item.address_components) ? item.address_components : [];
                        const cidadeComp = comps.find(c => Array.isArray(c.types) && (c.types.includes('locality') || c.types.includes('administrative_area_level_2')));
                        const ufComp = comps.find(c => Array.isArray(c.types) && c.types.includes('administrative_area_level_1'));
                        const cidadeItem = normalizarTextoGeo(cidadeComp?.long_name || '');
                        const ufItem = normalizarUfGeo(ufComp?.short_name || '');
                        const display = normalizarTextoGeo(item.formatted_address || '');
                        if (ufNorm && ufItem && ufNorm !== ufItem) return false;
                        if (cidadeNorm && cidadeItem && cidadeNorm !== cidadeItem && !display.includes(cidadeNorm)) return false;
                        return true;
                    }) || results[0];

                    const loc = melhor?.geometry?.location;
                    if (!loc) {
                        resolve(null);
                        return;
                    }
                    resolve({ lat: loc.lat(), lng: loc.lng() });
                });
            });

            if (coordenada && coordenadaValida(coordenada.lat, coordenada.lng)) {
                estado.geoCache[chave] = coordenada;
                return coordenada;
            }
            return null;
        }

        async function geocodificarEnderecoLeaflet(texto) {
            const chave = String(texto || '').trim().toLowerCase();
            if (!chave) return null;
            if (estado.geoCache[chave]) return estado.geoCache[chave];

            try {
                const cidadeNorm = normalizarTextoGeo(estado.restauranteCidadeTrava || '');
                const ufNorm = normalizarUfGeo(estado.restauranteUfTrava || '');
                const consultas = [];
                if (estado.restauranteCidadeTrava && estado.restauranteUfTrava) {
                    consultas.push(`${texto}, ${estado.restauranteCidadeTrava}, ${estado.restauranteUfTrava}, Brasil`);
                }
                if (estado.restauranteCidadeTrava) {
                    consultas.push(`${texto}, ${estado.restauranteCidadeTrava}, Brasil`);
                }
                consultas.push(/brasil/i.test(texto) ? texto : `${texto}, Brasil`);

                const unicas = Array.from(new Set(consultas.map(v => String(v || '').trim()).filter(Boolean)));
                for (const consulta of unicas) {
                    const url = `https://nominatim.openstreetmap.org/search?format=json&limit=5&countrycodes=br&addressdetails=1&q=${encodeURIComponent(consulta)}`;
                    const res = await fetch(url, {
                        headers: { 'Accept': 'application/json', 'Accept-Language': 'pt-BR,pt;q=0.9' }
                    });
                    if (!res.ok) continue;

                    const rows = await res.json();
                    if (!Array.isArray(rows) || !rows.length) continue;

                    const escolhido = rows.find((item) => {
                        const lat = Number(item?.lat);
                        const lng = Number(item?.lon);
                        if (!coordenadaValida(lat, lng)) return false;
                        const addr = item?.address && typeof item.address === 'object' ? item.address : {};
                        const cidadeItem = normalizarTextoGeo(addr.city || addr.town || addr.village || addr.municipality || addr.county || '');
                        const ufItem = normalizarUfGeo(addr.state_code || addr['ISO3166-2-lvl4'] || addr['ISO3166-2-lvl6'] || '');
                        const display = normalizarTextoGeo(item.display_name || '');
                        if (ufNorm && ufItem && ufNorm !== ufItem) return false;
                        if (cidadeNorm && cidadeItem && cidadeNorm !== cidadeItem && !display.includes(cidadeNorm)) return false;
                        return true;
                    }) || rows[0];

                    const lat = Number(escolhido?.lat);
                    const lng = Number(escolhido?.lon);
                    if (!coordenadaValida(lat, lng)) continue;

                    const coordenada = { lat, lng };
                    estado.geoCache[chave] = coordenada;
                    return coordenada;
                }
                return null;
            } catch (_) {
                return null;
            }
        }

        async function geocodificarEndereco(texto) {
            if (estado.modoMapa === 'google') {
                const byGoogle = await geocodificarEnderecoGoogle(texto);
                if (byGoogle) return byGoogle;
            }
            return geocodificarEnderecoLeaflet(texto);
        }

        async function focarMapaCidadeTrava(zoom = 13) {
            const consulta = consultaCidadeTrava();
            if (!consulta) return false;
            if (!estado.centroCidadeTrava) {
                const centro = await geocodificarEndereco(consulta);
                if (!centro || !coordenadaValida(Number(centro.lat), Number(centro.lng))) {
                    return false;
                }
                estado.centroCidadeTrava = { lat: Number(centro.lat), lng: Number(centro.lng) };
            }

            if (estado.modoMapa === 'google' && estado.map) {
                estado.map.setCenter(estado.centroCidadeTrava);
                estado.map.setZoom(Number(zoom) || 13);
                return true;
            }
            if (estado.modoMapa === 'leaflet' && estado.lfMap) {
                estado.lfMap.setView([estado.centroCidadeTrava.lat, estado.centroCidadeTrava.lng], Number(zoom) || 13);
                return true;
            }
            return false;
        }

        function criarMarkerCustom(url, tamanho = 44) {
            const img = document.createElement('img');
            img.src = url;
            img.style.width = `${tamanho}px`;
            img.style.height = `${tamanho}px`;
            img.style.objectFit = 'contain';
            return img;
        }

        function limparMarkers() {
            if (estado.markerMoto) estado.markerMoto.map = null;
            if (estado.markerCasa) estado.markerCasa.map = null;
            if (estado.markerRestaurante) estado.markerRestaurante.map = null;
            estado.markerMoto = null;
            estado.markerCasa = null;
            estado.markerRestaurante = null;
        }

        function atualizarMarkers({ restaurante, entregador, destino }) {
            if (estado.modoMapa !== 'google') return;
            limparMarkers();

            if (restaurante) {
                estado.markerRestaurante = new google.maps.marker.AdvancedMarkerElement({
                    map: estado.map,
                    position: restaurante,
                    content: criarMarkerCustom('https://cdn-icons-png.flaticon.com/512/3081/3081559.png', 38),
                    title: 'Restaurante'
                });
            }

            if (destino) {
                estado.markerCasa = new google.maps.marker.AdvancedMarkerElement({
                    map: estado.map,
                    position: destino,
                    content: criarMarkerCustom('https://cdn-icons-png.flaticon.com/512/1946/1946488.png', 40),
                    title: 'Casa do cliente'
                });
            }

            if (entregador) {
                estado.markerMoto = new google.maps.marker.AdvancedMarkerElement({
                    map: estado.map,
                    position: entregador,
                    content: criarMarkerCustom('https://cdn-icons-png.flaticon.com/512/3198/3198336.png', 46),
                    title: 'Entregador'
                });
            }
        }

        function ajustarBounds(entregador, destino, restaurante = null) {
            if (estado.modoMapa !== 'google') return;
            if (!entregador && !destino) return;
            const bounds = new google.maps.LatLngBounds();

            if (entregador) bounds.extend(entregador);
            if (destino) bounds.extend(destino);
            if (restaurante) bounds.extend(restaurante);

            const key = [
                entregador ? `${entregador.lat.toFixed(5)},${entregador.lng.toFixed(5)}` : '-',
                destino ? `${destino.lat.toFixed(5)},${destino.lng.toFixed(5)}` : '-',
                restaurante ? `${restaurante.lat.toFixed(5)},${restaurante.lng.toFixed(5)}` : '-'
            ].join('|');

            if (key !== estado.ultimoBoundsKey) {
                estado.map.fitBounds(bounds, { top: 60, right: 45, bottom: 60, left: 45 });
                estado.ultimoBoundsKey = key;
            }
        }

        function rotaPorRuas(origem, waypoints, destino) {
            if (estado.modoMapa !== 'google') return;
            if (!origem || !destino) return;

            estado.directionsService.route(
                {
                    origin: origem,
                    destination: destino,
                    waypoints: waypoints || [],
                    optimizeWaypoints: false,
                    travelMode: google.maps.TravelMode.DRIVING,
                    provideRouteAlternatives: false
                },
                (response, status) => {
                    if (status === 'OK' && response) {
                        estado.directionsRenderer.setDirections(response);
                        const legs = response.routes?.[0]?.legs || [];
                        const segundos = legs.reduce((soma, leg) => soma + Number(leg?.duration?.value || 0), 0);
                        if (segundos > 0) {
                            const min = Math.max(1, Math.round(segundos / 60));
                            atualizarEta(`${min} min`);
                        }
                    } else {
                        atualizarEtaAproximado(origem, destino);
                    }
                }
            );
        }

        async function buscarRastreamento() {
            if (!slug || !pedidoId) {
                document.getElementById('status-pedido').textContent = 'Link inválido';
                return;
            }

            try {
                const res = await fetch(`${API_URL}/api/public/pedidos/${pedidoId}/rastreamento?slug=${encodeURIComponent(slug)}`);
                if (!res.ok) throw new Error('Falha ao carregar rastreamento');
                const data = await res.json();

                const apiKeyRestaurante = String(data?.restaurante?.google_maps_api_key || '').trim();
                if (!estado.googleKey && apiKeyRestaurante) {
                    estado.googleKey = apiKeyRestaurante;
                }

                const status = String(data?.pedido?.status || '').toLowerCase();
                atualizarCabecalho(status, data?.restaurante?.nome || '');
                document.getElementById('status-pedido').textContent = statusLegivel(status);

                atualizarTravaCidadeRestaurante(data?.restaurante?.cidade || '', data?.restaurante?.uf || '');

                const latEnt = Number(data?.entregador?.lat);
                const lngEnt = Number(data?.entregador?.lon);
                const entregador = coordenadaValida(latEnt, lngEnt) ? { lat: latEnt, lng: lngEnt } : null;

                let destino = null;
                const latDest = Number(data?.destino?.lat);
                const lngDest = Number(data?.destino?.lon);
                if (coordenadaValida(latDest, lngDest)) {
                    destino = { lat: latDest, lng: lngDest };
                } else {
                    const coordEndereco = extrairCoordenadasEndereco(data?.destino?.endereco || {});
                    if (coordEndereco) {
                        destino = coordEndereco;
                    } else {
                        destino = await geocodificarEndereco(enderecoParaTexto(data?.destino?.endereco || {}));
                    }
                }

                let restaurante = await geocodificarEndereco(data?.restaurante?.endereco || '');

                if (estado.modoMapa === 'google') {
                    atualizarMarkers({ restaurante, entregador, destino });

                    if (entregador && destino) {
                        const origem = entregador || restaurante;
                        const waypoints = [];
                        rotaPorRuas(origem, waypoints, destino);
                    } else {
                        estado.directionsRenderer.set('directions', null);
                        atualizarEta('—');
                    }

                    ajustarBounds(entregador, destino, restaurante);
                    if (!entregador && !destino && !restaurante) {
                        await focarMapaCidadeTrava(13);
                    }
                } else {
                    await desenharLeafletFallback({ restaurante, entregador, destino });
                    if (entregador && destino) {
                        atualizarEtaAproximado(entregador, destino);
                    } else {
                        atualizarEta('—');
                        if (!entregador && !destino && !restaurante) {
                            await focarMapaCidadeTrava(13);
                        }
                    }
                }

                if (!data?.pedido?.rastreamento_ativo || ['entregue', 'cancelado', 'fechado'].includes(status)) {
                    if (estado.poller) {
                        clearInterval(estado.poller);
                        estado.poller = null;
                    }
                }
            } catch (_) {
                document.getElementById('status-pedido').textContent = 'Erro de atualização';
            }
        }

        function initLeafletFallback() {
            estado.modoMapa = 'leaflet';
            estado.ultimaRotaKey = '';
            const mapaEl = document.getElementById('map');
            mapaEl.innerHTML = '';
            if (estado.lfMap) {
                estado.lfMap.remove();
                estado.lfMap = null;
            }

            estado.lfMap = L.map('map', { zoomControl: true, attributionControl: true }).setView([-14.235004, -51.92528], 5);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap &copy; CARTO',
                subdomains: 'abcd',
                maxZoom: 19
            }).addTo(estado.lfMap);
            focarMapaCidadeTrava(13).catch(() => {});
        }

        function limparLeafletFallback() {
            if (!estado.lfMap) return;
            if (estado.lfMarkers.moto) estado.lfMap.removeLayer(estado.lfMarkers.moto);
            if (estado.lfMarkers.casa) estado.lfMap.removeLayer(estado.lfMarkers.casa);
            if (estado.lfMarkers.restaurante) estado.lfMap.removeLayer(estado.lfMarkers.restaurante);
            if (estado.lfLine) estado.lfMap.removeLayer(estado.lfLine);
            if (estado.lfDecorLine) estado.lfMap.removeLayer(estado.lfDecorLine);
            estado.lfMarkers = { moto: null, casa: null, restaurante: null };
            estado.lfLine = null;
            estado.lfDecorLine = null;
        }

        function criarIconeLeaflet(tipo) {
            const mapaIcones = {
                restaurante: { emoji: '🏬', cls: 'restaurante' },
                cliente: { emoji: '🏠', cls: 'cliente' },
                moto: { emoji: '🛵', cls: 'moto' }
            };
            const cfg = mapaIcones[tipo] || mapaIcones.moto;
            return L.divIcon({
                className: '',
                html: `<div class="lf-pin ${cfg.cls}">${cfg.emoji}</div>`,
                iconSize: [34, 34],
                iconAnchor: [17, 17]
            });
        }

        function desenharLinhaLeaflet(linha) {
            if (!estado.lfMap || !linha || linha.length < 2) return;
            estado.lfLine = L.polyline(linha, {
                color: '#ea1d2c',
                weight: 6,
                opacity: 0.9,
                lineJoin: 'round'
            }).addTo(estado.lfMap);

            estado.lfDecorLine = L.polyline(linha, {
                color: '#ffffff',
                weight: 2,
                opacity: 0.65,
                dashArray: '10 10'
            }).addTo(estado.lfMap);
        }

        async function obterRotaRoadLeaflet(origem, destino, waypoints = []) {
            if (!origem || !destino) return [];
            const lista = [origem, ...waypoints, destino];
            const rotaKey = lista.map((p) => `${p.lat.toFixed(5)},${p.lng.toFixed(5)}`).join('|');
            if (rotaKey === estado.ultimaRotaKey && estado.lfLine) {
                return [];
            }

            try {
                const coords = lista.map((p) => `${p.lng},${p.lat}`).join(';');
                const url = `https://router.project-osrm.org/route/v1/driving/${coords}?overview=full&geometries=geojson`;
                const res = await fetch(url);
                if (!res.ok) return [];
                const data = await res.json();
                const route = data?.routes?.[0]?.geometry?.coordinates;
                if (!Array.isArray(route) || route.length < 2) return [];

                estado.ultimaRotaKey = rotaKey;
                return route.map(([lng, lat]) => [lat, lng]);
            } catch (_) {
                return [];
            }
        }

        async function desenharLeafletFallback({ restaurante, entregador, destino }) {
            if (!estado.lfMap) return;
            limparLeafletFallback();

            const pontos = [];
            if (restaurante) {
                estado.lfMarkers.restaurante = L.marker([restaurante.lat, restaurante.lng], { icon: criarIconeLeaflet('restaurante') }).addTo(estado.lfMap).bindPopup('Restaurante');
                pontos.push([restaurante.lat, restaurante.lng]);
            }
            if (entregador) {
                estado.lfMarkers.moto = L.marker([entregador.lat, entregador.lng], { icon: criarIconeLeaflet('moto') }).addTo(estado.lfMap).bindPopup('Entregador');
                pontos.push([entregador.lat, entregador.lng]);
            }
            if (destino) {
                estado.lfMarkers.casa = L.marker([destino.lat, destino.lng], { icon: criarIconeLeaflet('cliente') }).addTo(estado.lfMap).bindPopup('Cliente');
                pontos.push([destino.lat, destino.lng]);
            }

            const waypoints = [];
            const origem = entregador || restaurante;

            let linha = [];
            if (origem && destino) {
                linha = await obterRotaRoadLeaflet(origem, destino, waypoints);
            }
            if (!linha.length) {
                if (restaurante) linha.push([restaurante.lat, restaurante.lng]);
                if (entregador) linha.push([entregador.lat, entregador.lng]);
                if (destino) linha.push([destino.lat, destino.lng]);
            }

            if (linha.length >= 2) {
                desenharLinhaLeaflet(linha);
            }

            if (pontos.length) {
                estado.lfMap.fitBounds(L.latLngBounds(pontos).pad(0.16), { maxZoom: 16 });
            }
        }

        function initMap() {
            estado.modoMapa = 'google';
            estado.googleCarregado = true;
            const fallback = { lat: -14.235004, lng: -51.92528 };
            estado.map = new google.maps.Map(document.getElementById('map'), {
                zoom: 15,
                center: fallback,
                ...(GOOGLE_MAP_ID ? { mapId: GOOGLE_MAP_ID } : {}),
                disableDefaultUI: true,
                zoomControl: true,
                streetViewControl: false,
                fullscreenControl: false,
                mapTypeControl: false
            });

            estado.directionsService = new google.maps.DirectionsService();
            estado.directionsRenderer = new google.maps.DirectionsRenderer({
                map: estado.map,
                suppressMarkers: true,
                polylineOptions: {
                    strokeColor: '#ea1d2c',
                    strokeWeight: 6,
                    strokeOpacity: 0.82
                }
            });

            focarMapaCidadeTrava(13).catch(() => {});

            buscarRastreamento();
            estado.poller = setInterval(buscarRastreamento, 6000);
        }

        window.gm_authFailure = function () {
            initLeafletFallback();
            buscarRastreamento();
            if (!estado.poller) {
                estado.poller = setInterval(buscarRastreamento, 6000);
            }
        };

        function iniciarPollingRastreamento() {
            if (!estado.poller) {
                estado.poller = setInterval(buscarRastreamento, 6000);
            }
        }

        function carregarGoogleMaps(googleKey) {
            if (!googleKey) {
                initLeafletFallback();
                buscarRastreamento();
                iniciarPollingRastreamento();
                return;
            }

            if (estado.googleCarregado && window.google?.maps) {
                initMap();
                return;
            }

            const script = document.createElement('script');
            script.src = `https://maps.googleapis.com/maps/api/js?key=${encodeURIComponent(googleKey)}&libraries=places,geometry,marker&callback=initMap`;
            script.async = true;
            script.defer = true;
            script.onerror = () => {
                initLeafletFallback();
                buscarRastreamento();
                iniciarPollingRastreamento();
            };
            window.initMap = initMap;
            document.head.appendChild(script);
        }

        async function iniciarAplicacaoReal() {
            if (!slug || !pedidoId) {
                initLeafletFallback();
                document.getElementById('status-pedido').textContent = 'Link inválido';
                return;
            }

            let dadosIniciais = null;
            try {
                const res = await fetch(`${API_URL}/api/public/pedidos/${pedidoId}/rastreamento?slug=${encodeURIComponent(slug)}`);
                if (res.ok) {
                    dadosIniciais = await res.json();
                    const apiKeyRestaurante = String(dadosIniciais?.restaurante?.google_maps_api_key || '').trim();
                    if (!estado.googleKey && apiKeyRestaurante) {
                        estado.googleKey = apiKeyRestaurante;
                    }
                }
            } catch (_) {
                dadosIniciais = null;
            }

            const forcarLeaflet = MODO_MAPA_PARAM === '0';
            const forcarGoogle = MODO_MAPA_PARAM === '1';
            const usarGoogle = forcarGoogle || (!forcarLeaflet && !!estado.googleKey);

            if (usarGoogle) {
                carregarGoogleMaps(estado.googleKey);
            } else {
                initLeafletFallback();
                buscarRastreamento();
                iniciarPollingRastreamento();
            }
        }

        iniciarAplicacaoReal();
    </script>
</body>
</html>
