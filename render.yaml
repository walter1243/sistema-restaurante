databases:
  - name: foodos-postgres
    plan: free
    databaseName: foodos
    user: foodos

services:
  - type: web
    name: sistema-restaurante-api
    runtime: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: DATABASE_URL
        fromDatabase:
          name: foodos-postgres
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CORS_ALLOWED_ORIGIN_REGEX
        sync: false
      - key: TERMS_URL
        sync: false
      - key: PRIVACY_URL
        sync: false
      - key: SUPER_ADMIN_NOME
        sync: false
      - key: SUPER_ADMIN_LOGIN
        sync: false
      - key: SUPER_ADMIN_SENHA
        sync: false
      - key: DEFAULT_RESTAURANTE_NOME
        sync: false
      - key: DEFAULT_RESTAURANTE_SLUG
        sync: false
      - key: DEFAULT_RESTAURANTE_EMAIL
        sync: false
      - key: DEFAULT_RESTAURANTE_SENHA
        sync: false
      - key: DEFAULT_RESTAURANTE_PLAN_TYPE
        sync: false
      - key: MP_ACCESS_TOKEN
        sync: false
      - key: MP_PUBLIC_KEY
        sync: false
      - key: PUSH_VAPID_PUBLIC_KEY
        sync: false
      - key: PUSH_VAPID_PRIVATE_KEY
        sync: false
      - key: PUSH_VAPID_CLAIMS_SUB
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: SMTP_TLS
        sync: false
      - key: SMTP_SSL
        sync: false
