databases:
  - name: foodos-postgres
    plan: free
    databaseName: foodos
    user: foodos

services:
  - type: web
    name: sistema-restaurante-api
    runtime: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        fromDatabase:
          name: foodos-postgres
          property: connectionString
      - key: MP_ACCESS_TOKEN
        sync: false
      - key: MP_PUBLIC_KEY
        sync: false
      - key: PUSH_VAPID_PUBLIC_KEY
        sync: false
      - key: PUSH_VAPID_PRIVATE_KEY
        sync: false
      - key: PUSH_VAPID_CLAIMS_SUB
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: SMTP_TLS
        sync: false
      - key: SMTP_SSL
        sync: false
