<!DOCTYPE html>
<html>
<head>
  <title>Redirecionando...</title>
  <script>
    (function() {
      const host = window.location.hostname;

      if (host === 'admin.foodos.com.br') {
        window.location.href = '/super_admin.html';
      } else if (host === 'app.foodos.com.br') {
        window.location.href = '/admin.html';
      } else if (host === 'entregador.foodos.com.br') {
        window.location.href = '/entregador.html';
      } else {
        // Para foodos.com.br ou qualquer outro, vai para vendas
        window.location.href = '/site_vendas.html';
      }
    })();
  </script>
</head>
<body>
  <p>Carregando...</p>
</body>
</html>
